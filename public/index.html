<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tasks</title>
    <script src="https://c.vazirweb.ir/cdn/tailwind/3.4.10/tailwind.play.min.js"></script>
    <link rel="stylesheet" href="https://c.vazirweb.ir/cdn/toastify/1.12.0/toastify.min.css">
    <script src="https://c.vazirweb.ir/cdn/toastify/1.12.0/toastify.min.js"></script>
    <style>
        /* @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap'); */

        * {
            font-family: 'Inter', sans-serif;
        }

        body {
            background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
            min-height: 100vh;
        }

        :root {
            --bg: rgba(255, 255, 255, 0.05);
            --bg-strong: rgba(255, 255, 255, 0.1);
            --text: #ffffff;
            --border: rgba(255, 255, 255, 0.2);
        }

        .theme-dark {
            --bg: #0c0c0f;
            --bg-strong: #1a1a22;
            --text: #f5f5f5;
            --border: rgba(255, 255, 255, 0.1);
        }

        .theme-glass {
            --bg: rgba(255, 255, 255, 0.06);
            --bg-strong: rgba(255, 255, 255, 0.12);
            --text: white;
            --border: rgba(255, 255, 255, 0.15);
        }


        .glass {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }


        .task {
            animation: slideIn 0.3s ease forwards;
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 0.75rem;
            padding: 0.75rem 1rem;
            color: rgba(255, 255, 255, 0.85);
            font-size: 0.875rem;
            font-weight: 500;
            gap: 0.75rem;
        }

        .task:hover {
            background: rgba(255, 255, 255, 0.09);
            border-color: rgba(255, 255, 255, 0.15);
        }

        .li-done {
            background-color: rgb(22 255 117 / 16%);
            animation: slideIn 1.5s ease forwards;
            transition: all 0.5s;
            text-decoration: red line-through;
        }


        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(-10px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .btn-del {
            background: rgba(239, 68, 68, 0.1);
            color: rgb(252, 165, 165);
            border: 1px solid rgba(239, 68, 68, 0.2);
            border-radius: 0.5rem;
            padding: 0.25rem 0.65rem;
            font-size: 0.75rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
            flex-shrink: 0;
        }



        .btn-done {
            background: rgba(68, 239, 111, 0.1);
            color: rgb(165, 252, 177);
            border: 1px solid rgba(239, 68, 68, 0.2);
            border-radius: 0.5rem;
            padding: 0.25rem 0.65rem;
            font-size: 0.75rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
            flex-shrink: 0;
        }


        .btn-done:hover {
            background: rgba(74, 239, 68, 0.3);
            border-color: rgba(68, 239, 91, 0.5);
            transform: scale(1.08);
        }


        .btn-del:hover {
            background: rgba(239, 68, 68, 0.3);
            border-color: rgba(239, 68, 68, 0.5);
            transform: scale(1.08);
        }

        .btn-parent-div button {
            margin-right: 10px;
        }

        input::placeholder {
            color: rgba(255, 255, 255, 0.25);
        }

        input:focus {
            outline: none;
            border-color: rgb(139, 92, 246);
            background: rgba(255, 255, 255, 0.1);
        }

        ::-webkit-scrollbar {
            width: 4px;
        }

        ::-webkit-scrollbar-track {
            background: transparent;
        }

        ::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.15);
            border-radius: 10px;
        }

        .pulse-dot {
            animation: pulse 2s infinite;
        }

        .bookmark-li {
            animation: slideIn 0.5s;

        }

        .visible {

            animation: popup .5s linear;
        }

        .hidden {

            animation: popupClose 1s forwards;
        }

        @keyframes popup {
            from {
                opacity: 0;
            }

            to {
                opacity: 1;
            }
        }

        @keyframes popupClose {
            from {
                opacity: 1;
            }

            to {
                opacity: 0;
            }
        }

        @keyframes pulse {

            0%,
            100% {
                opacity: 1;
            }

            50% {
                opacity: 0.3;
            }
        }
    </style>
</head>

<body class="flex items-center justify-center p-4">

    <div class="w-full max-w-lg mt-10">

        <nav>
            <ul>
                <div class="fixed top-6 right-6 flex gap-4 z-10">
                    <button id="openModal" onclick="openModal('dashboardModal')"
                        class="glass p-3 rounded-full text-white hover:scale-110 transition-all">
                        <svg xmlns="http://www.w3.org/2000/svg" class="w-6 h-6" fill="none" viewBox="0 0 24 24"
                            stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                d="M4 6a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2H6a2 2 0 01-2-2V6zM14 6a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2h-2a2 2 0 01-2-2V6zM4 16a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2H6a2 2 0 01-2-2v-2zM14 16a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2h-2a2 2 0 01-2-2v-2z" />
                        </svg>
                    </button>
                    <button onclick="openModal('settingsModal')"
                        class="glass p-3 rounded-full text-white hover:scale-110 transition-all" id="openSettings">
                        <svg xmlns="http://www.w3.org/2000/svg" class="w-6 h-6" fill="none" viewBox="0 0 24 24"
                            stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z" />
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" />
                        </svg>
                    </button>
                </div>
            </ul>
        </nav>

        <!-- Header -->
        <div class="text-center mb-8">
            <div class="flex items-center justify-center gap-2 mb-2">
                <span class="pulse-dot w-2 h-2 bg-violet-400 rounded-full inline-block"></span>
                <span class="text-violet-300 text-xs font-medium uppercase tracking-widest">Productivity</span>
            </div>
            <h1 class="text-white text-4xl font-bold tracking-tight">My Tasks</h1>
            <p class="text-white/30 text-sm mt-1">Stay organized. Stay ahead.</p>
        </div>

        <!-- Card -->
        <div class="glass rounded-3xl p-6 shadow-2xl">

        <!-- Form -->
<form action="" id="taskform" class="flex flex-wrap gap-3 mb-6">
    <div class="relative flex-1 min-w-[200px]">
        <span class="absolute left-3.5 top-1/2 -translate-y-1/2 text-white/25 pointer-events-none">
            <svg xmlns="http://www.w3.org/2000/svg" class="w-4 h-4" fill="none" viewBox="0 0 24 24"
                stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4" />
            </svg>
        </span>
        <input type="text" id="taskinput" placeholder="Add a new task..." autocomplete="off"
            class="w-full bg-white/5 border border-white/10 text-white text-sm rounded-xl pl-10 pr-4 py-3 transition-all duration-200 focus:border-violet-500 focus:outline-none focus:ring-2 focus:ring-violet-500/20" />
    </div>
    
    <div class="relative">
        <span class="absolute left-3.5 top-1/2 -translate-y-1/2 text-white/25 pointer-events-none">
            <svg xmlns="http://www.w3.org/2000/svg" class="w-4 h-4" fill="none" viewBox="0 0 24 24"
                stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z" />
            </svg>
        </span>
        <input type="date" id="datepicker"
            class="bg-white/5 border border-white/10 text-white text-sm rounded-xl pl-10 pr-4 py-3 transition-all duration-200 focus:border-violet-500 focus:outline-none focus:ring-2 focus:ring-violet-500/20 cursor-pointer" />
    </div>
    
    <button type="submit" id="tasksubmit"
        class="bg-violet-600 hover:bg-violet-500 active:scale-95 text-white font-semibold text-sm px-6 py-3 rounded-xl transition-all duration-200 shadow-lg shadow-violet-900/50 whitespace-nowrap cursor-pointer flex items-center gap-2">
        <svg xmlns="http://www.w3.org/2000/svg" class="w-4 h-4" fill="none" viewBox="0 0 24 24"
            stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4" />
        </svg>
        Add Task
    </button>
    
    <button type="button" id="clearTasks"
        class="bg-red-600/90 hover:bg-red-500 active:scale-95 text-white font-semibold text-sm px-6 py-3 rounded-xl transition-all duration-200 shadow-lg shadow-red-900/50 whitespace-nowrap cursor-pointer flex items-center gap-2">
        <svg xmlns="http://www.w3.org/2000/svg" class="w-4 h-4" fill="none" viewBox="0 0 24 24"
            stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16" />
        </svg>
        Clear All
    </button>
</form>


            <!-- Divider -->
            <div class="flex items-center gap-3 mb-4">
                <div class="flex-1 h-px bg-white/10"></div>
                <span class="text-white/25 text-xs font-medium">tasks</span>
                <div class="flex-1 h-px bg-white/10"></div>
            </div>

            <!-- Tasks List -->
            <ul id="taskslist" class="flex flex-col gap-2 max-h-80 overflow-y-auto pr-1">
            </ul>

        </div>

        <p class="text-center text-white/15 text-xs mt-6">Built with ♥ to keep you on track</p>

        <div id="modal" class="glass fixed bg-black/60 flex inset-0 items-center justify-center z-50">
            <button id="closeModal"
                class="absolute top-20 right-20 text-2xl text-white/50 hover:text-white hover:scale-110 transition-all">
                <svg xmlns="http://www.w3.org/2000/svg" class="w-10 h-10" fill="none" viewBox="0 0 24 24"
                    stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M18 6L6 18M6 6l12 12" />
                </svg>
            </button>
            <div class="glass bg-white/5 backdrop-blur-xl p-10 rounded-3xl border border-white/10 shadow-lg">
                <h1 class="text-white/95 text-2xl font-semibold pb-4 flex items-center gap-2">
                    <span>📚</span> Bookmarks
                </h1>

                <div class="h-px w-full bg-white/20 mb-6"></div>

                <div class="flex flex-row gap-4 items-end">
                    <div class="flex flex-col flex-grow gap-4">
                        <input type="text" id="bookmarkName" placeholder="Bookmark name..." autocomplete="off"
                            class="w-full bg-white/10 border border-white/20 text-white text-sm rounded-xl px-4 py-3 placeholder-white/50 focus:outline-none focus:ring-2 focus:ring-white/40 transition" />

                        <input type="text" id="bookmarkLink" placeholder="https://example.com" autocomplete="off"
                            class="w-full bg-white/10 border border-white/20 text-white text-sm rounded-xl px-4 py-3 placeholder-white/50 focus:outline-none focus:ring-2 focus:ring-white/40 transition" />
                    </div>

                    <button id="bookmarkBtn"
                        class="p-3 bg-white text-black rounded-xl shadow hover:scale-105 hover:bg-white/90 transition flex items-center justify-center">
                        <svg xmlns="http://www.w3.org/2000/svg" class="w-6 h-6" fill="none" viewBox="0 0 24 24"
                            stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5"
                                d="M12 5v14m7-7H5" />
                        </svg>
                    </button>
                </div>

                <ul id="bookmarkList" class="flex flex-col mt-8 gap-3">
                    <!-- New bookmarks will appear here -->
                </ul>
            </div>

        </div>

        <div id="settings"
            class="fixed inset-0 z-50 flex items-center justify-center bg-black/70 backdrop-blur-xl p-10">

            <!-- Close button -->
            <button id="closeSettings"
                class="absolute top-10 right-10 text-white/60 hover:text-white transition-all hover:scale-110">
                <svg xmlns="http://www.w3.org/2000/svg" class="w-10 h-10" fill="none" viewBox="0 0 24 24"
                    stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M18 6L6 18M6 6l12 12" />
                </svg>
            </button>

            <!-- Settings Panel -->
            <ul
                class="flex flex-col gap-8 w-full max-w-xl bg-white/10 backdrop-blur-2xl border border-white/20 shadow-2xl rounded-3xl p-10">

                <!-- THEME SECTION -->
                <div class="flex flex-col gap-4">
                    <li id="themeSettings"
                        class="flex items-center gap-4 bg-white/10 border border-white/20 rounded-xl p-4 text-white text-xl hover:bg-white/20 transition cursor-pointer">
                        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5"
                            stroke="currentColor" class="w-7 h-7 opacity-80">
                            <path stroke-linecap="round" stroke-linejoin="round"
                                d="M11.25 6.75c0-.69.56-1.25 1.25-1.25h.5a5.75 5.75 0 015.75 5.75v.5c0 .69-.56 1.25-1.25 1.25h-1.86a1.25 1.25 0 00-1.15.78l-.73 1.82a2.75 2.75 0 11-5.16-2.06l1.07-2.67a1.25 1.25 0 00-.74-1.62 3.75 3.75 0 113.57-6.25z" />
                        </svg>
                        Theme
                    </li>

                    <div class="flex flex-col gap-5 bg-white/10 border border-white/20 rounded-xl p-6 hidden">
                        <h1 class="text-white text-2xl font-semibold">Choose your theme</h1>
                        <div class="flex gap-4">
                            <button type="submit" id="tasksubmit"
                                class="bg-violet-600 hover:bg-violet-500 active:scale-95 text-white font-semibold text-sm px-5 py-3 rounded-xl transition duration-200 shadow-lg shadow-violet-900/50">
                                Sky
                            </button>
                            <button type="submit" id="tasksubmit"
                                class="bg-violet-600 hover:bg-violet-500 active:scale-95 text-white font-semibold text-sm px-5 py-3 rounded-xl transition duration-200 shadow-lg shadow-violet-900/50">
                                Light
                            </button>
                        </div>
                    </div>
                </div>

                <!-- ACCOUNT SECTION -->
                <div class="flex flex-col gap-4">
                    <li id="accountSettings"
                        class="flex items-center gap-4 bg-white/10 border border-white/20 rounded-xl p-4 text-white text-xl hover:bg-white/20 transition cursor-pointer">
                        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5"
                            stroke="currentColor" class="w-7 h-7 opacity-80">
                            <path stroke-linecap="round" stroke-linejoin="round"
                                d="M15.75 6.75a3.75 3.75 0 11-7.5 0 3.75 3.75 0 017.5 0zM4.5 20.25a8.25 8.25 0 0115 0" />
                        </svg>
                        Account
                    </li>

                    <div class="flex flex-col gap-6 bg-white/10 border border-white/20 rounded-xl p-8 hidden">

                        <h1 class="text-white text-2xl font-semibold">Information</h1>

                        <div class="flex flex-col gap-5 w-full" id="infoarray">

                            <input type="text" id="fname" placeholder="First name" autocomplete="off"
                                class="w-full bg-white/10 border border-white/20 text-white text-sm rounded-xl px-4 py-3 placeholder-white/50 focus:outline-none focus:ring-2 focus:ring-white/40 transition" />

                            <input type="text" id="lname" placeholder="Last name" autocomplete="off"
                                class="w-full bg-white/10 border border-white/20 text-white text-sm rounded-xl px-4 py-3 placeholder-white/50 focus:outline-none focus:ring-2 focus:ring-white/40 transition" />

                            <input type="text" id="settingsID" placeholder="ID" autocomplete="off"
                                class="w-full bg-white/10 border border-white/20 text-white text-sm rounded-xl px-4 py-3 placeholder-white/50 focus:outline-none focus:ring-2 focus:ring-white/40 transition" />

                            <input type="text" id="zipcode" placeholder="Zip code" autocomplete="off"
                                class="w-full bg-white/10 border border-white/20 text-white text-sm rounded-xl px-4 py-3 placeholder-white/50 focus:outline-none focus:ring-2 focus:ring-white/40 transition" />

                            <input type="text" id="address" placeholder="Address" autocomplete="off"
                                class="w-full bg-white/10 border border-white/20 text-white text-sm rounded-xl px-4 py-3 placeholder-white/50 focus:outline-none focus:ring-2 focus:ring-white/40 transition" />

                        </div>

                        <button type="submit" id="infosubmit"
                            class="self-start bg-violet-600 hover:bg-violet-500 active:scale-95 text-white font-semibold text-sm px-6 py-3 rounded-xl transition shadow-lg shadow-violet-900/50">
                            Save Info
                        </button>

                    </div>
                </div>

                <!-- UPDATES -->
                <li
                    class="flex items-center gap-4 bg-white/10 border border-white/20 rounded-xl p-4 text-white text-xl select-none">
                    <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5"
                        stroke="currentColor" class="w-7 h-7 opacity-80">
                        <path stroke-linecap="round" stroke-linejoin="round"
                            d="M14.25 17.25a2.25 2.25 0 11-4.5 0m9-7.5a6.75 6.75 0 10-13.5 0c0 3.165-1.217 5.616-2.054 6.757a1.125 1.125 0 00.9 1.743h16.308a1.125 1.125 0 00.9-1.743c-.837-1.141-2.054-3.592-2.054-6.757z" />
                    </svg>
                    Updates
                </li>

            </ul>

        </div>

    </div>



    <script src="https://c.vazirweb.ir/cdn/axios/1.13.6/axios.min.js"></script>
    <script src="./script.js"></script>
</body>

</html>
